[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# 기존 API 프록시 유지
[[redirects]]
  from = "/_be/api/*"
  to = "https://bobple-be.onrender.com/api/:splat"
  status = 200
  force = true

# ✅ WebSocket 프록시 (배포는 HTTPS → WSS)
[[redirects]]
  from = "/_be/ws/*"
  to = "https://bobple-be.onrender.com/ws/:splat"  # ← wss로 명시 권장
  status = 200
  force = true
