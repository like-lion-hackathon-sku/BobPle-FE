[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# API 프록시는 그대로 유지
[[redirects]]
  from = "/api/*"
  to = "https://bobple-be.onrender.com/api/:splat"
  status = 200
  force = true
  headers = { X-Forwarded-Host = ":host" }

# ✅ WebSocket 프록시만 추가
[[redirects]]
  from = "/ws/*"
  to = "https://bobple-be.onrender.com/ws/:splat"
  status = 200
  force = true
  headers = { X-Forwarded-Host = ":host" }
