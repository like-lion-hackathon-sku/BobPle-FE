[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# WS (로컬과 동일 프리픽스)
[[redirects]]
from = "/_be/ws/*"
to   = "https://bobple-be.onrender.com/ws/:splat"
status = 200
force = true
headers = { X-Forwarded-Host=":host", X-Forwarded-Proto="https" }

# API
[[redirects]]
from = "/_be/api/*"
to   = "https://bobple-be.onrender.com/api/:splat"
status = 200
force = true
headers = { X-Forwarded-Host=":host", X-Forwarded-Proto="https" }
