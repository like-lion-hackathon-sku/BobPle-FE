# netlify.toml (배포용 최종본)

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# 🔑 BE 프록시 설정
# 프론트에서 /_be/... 로 API 요청 → BE로 리라이트
[[redirects]]
  from = "/_be/*"
  to = "https://bobple-be.onrender.com/:splat"
  status = 200
  force = true
  headers = { X-Forwarded-Host = ":host" }
